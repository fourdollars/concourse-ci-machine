options:
  mode:
    description: |
      Deployment mode for this unit: 
      - 'auto': Leader runs web, non-leaders run workers (recommended for multi-unit)
      - 'all': Run both web and worker on this unit (default for single-unit)
      - 'web': Only run web server
      - 'worker': Only run worker
      Default: auto
    default: "auto"
    type: string
  
  version:
    description: |
      Concourse CI version to deploy (e.g., 7.14.3).
      Leave empty to use the latest stable version.
    default: ""
    type: string
  
  shared-storage:
    description: |
      Shared storage mode for LXC testing:
      - 'none': Disable shared storage, each unit downloads independently (default)
      - 'lxc': Enable LXC-mounted shared storage (requires .lxc_shared_storage marker)
      When set to 'lxc', units will wait for the marker file before proceeding.
      Default: none
    default: "none"
    type: string
  
  web-port:
    description: |
      Port for Concourse web UI and API server.
      Supports dynamic changes with automatic service restart.
      Privileged ports (< 1024) are supported via CAP_NET_BIND_SERVICE.
      Default: 8080
    default: 8080
    type: int
  
  worker-procs:
    description: |
      Number of worker processes to spawn on this unit.
      Controls parallelism for job execution.
      Default: 1
    default: 1
    type: int
  
  external-url:
    description: |
      External URL for Concourse web UI (used for redirects and webhooks).
      If not set, automatically detects and uses http://<unit-ip>:<web-port>
      Important: Set this to your actual external URL if behind a proxy/NAT.
    default: ""
    type: string
  
  tls-enabled:
    description: |
      Enable TLS/HTTPS for Concourse web UI.
      Requires TLS certificate relation (future enhancement).
      Default: false
    default: false
    type: boolean
  
  initial-admin-username:
    description: |
      Initial admin user for Concourse authentication.
      Default: admin
    default: admin
    type: string
  
  log-level:
    description: |
      Logging level for Concourse components (debug, info, warn, error).
      Default: info
    default: info
    type: string
    enum:
      - debug
      - info
      - warn
      - error
  
  enable-metrics:
    description: |
      Enable Prometheus metrics endpoint on port 9391 and per-job status exporter on port 9358.
      When enabled, installs and runs concourse-exporter service that exposes job-level metrics.
      Default: false
    default: false
    type: boolean
  
  max-concurrent-downloads:
    description: |
      Maximum number of concurrent resource downloads.
      Default: 10
    default: 10
    type: int
  
  container-placement-strategy:
    description: |
      Container placement strategy (volume-locality, random, fewest-build-containers).
      Default: volume-locality
    default: volume-locality
    type: string
  
  containerd-dns-proxy-enable:
    description: |
      Enable containerd DNS proxy for container name resolution.
      Set to false to use external DNS servers directly.
      Default: false
    default: false
    type: boolean
  
  containerd-dns-server:
    description: |
      DNS servers for containerd containers (comma-separated).
      Used when containerd-dns-proxy-enable is false.
      Default: 1.1.1.1,8.8.8.8
    default: "1.1.1.1,8.8.8.8"
    type: string
  
  compute-runtime:
    description: |
      GPU compute runtime to enable: 'none', 'cuda', or 'rocm'.
      - 'none': No GPU support (default)
      - 'cuda': Enable NVIDIA CUDA GPU support
      - 'rocm': Enable AMD ROCm GPU support
      When enabled, automatically installs container toolkit and configures GPU passthrough.
      Worker will be tagged with GPU capabilities for job targeting.
      Default: none
    default: "none"
    type: string
  
  gpu-device-ids:
    description: |
      GPU device IDs to expose to worker (comma-separated).
      Use "all" to expose all GPUs, or specify devices like "0,1".
      Only used when compute-runtime is set to 'cuda' or 'rocm'.
      Default: all
    default: "all"
    type: string

  tag:
    description: |
      Comma-separated list of tags to assign to this worker. These are added to
      CONCOURSE_TAG and merged with any GPU-generated tags.
      Example: "gpu,high-mem,ssd"
    default: ""
    type: string

  vault-url:
    description: "URL of the Vault server. If set, enables Vault credential management. Example: https://vault.example.com:8200"
    default: ""
    type: string

  vault-auth-backend:
    description: "Vault authentication backend (e.g., 'approle', 'token')."
    default: ""
    type: string

  vault-auth-backend-max-ttl:
    description: "Maximum TTL for the Vault authentication backend token. Example: '1h'"
    default: ""
    type: string

  vault-auth-param:
    description: "Comma-separated key-value pairs for the selected auth backend. Example: 'role_id:...,secret_id:...'"
    default: ""
    type: string

  vault-ca-cert:
    description: "Path to a PEM-encoded CA cert file to use for TLS to Vault."
    default: ""
    type: string

  vault-client-cert:
    description: "Path to a PEM-encoded client certificate for TLS authentication to Vault."
    default: ""
    type: string

  vault-client-key:
    description: "Path to an unencrypted, PEM-encoded private key for TLS authentication to Vault."
    default: ""
    type: string

  vault-client-token:
    description: "Vault client token."
    default: ""
    type: string

  vault-lookup-templates:
    description: "Vault lookup templates."
    default: ""
    type: string

  vault-namespace:
    description: "Vault namespace."
    default: ""
    type: string

  vault-path-prefix:
    description: "Prefix for all secret paths in Vault (e.g., '/concourse/my-team')."
    default: ""
    type: string

  vault-shared-path:
    description: "Shared path for Vault."
    default: ""
    type: string

  # --- Encryption ---

  encryption-key:
    description: |
      Encryption key for Concourse database at-rest encryption.
      Required when migrating from an existing encrypted deployment.
      Maps to CONCOURSE_ENCRYPTION_KEY.
    default: ""
    type: string

  # --- LDAP / SSO ---

  ldap-display-name:
    description: "Display name for LDAP authentication provider. Maps to CONCOURSE_LDAP_DISPLAY_NAME."
    default: ""
    type: string

  ldap-host:
    description: "LDAP server hostname (e.g., ldap.example.com). Maps to CONCOURSE_LDAP_HOST."
    default: ""
    type: string

  ldap-bind-dn:
    description: "LDAP bind DN for authentication (e.g., cn=admin,dc=example,dc=com). Maps to CONCOURSE_LDAP_BIND_DN."
    default: ""
    type: string

  ldap-bind-pw:
    description: "LDAP bind password. Maps to CONCOURSE_LDAP_BIND_PW."
    default: ""
    type: string

  ldap-user-search-base-dn:
    description: "Base DN for LDAP user searches. Maps to CONCOURSE_LDAP_USER_SEARCH_BASE_DN."
    default: ""
    type: string

  ldap-user-search-username:
    description: "LDAP attribute to match against the username. Maps to CONCOURSE_LDAP_USER_SEARCH_USERNAME."
    default: ""
    type: string

  ldap-user-search-id-attr:
    description: "LDAP attribute used as the user ID. Maps to CONCOURSE_LDAP_USER_SEARCH_ID_ATTR."
    default: ""
    type: string

  ldap-user-search-email-attr:
    description: "LDAP attribute for user email. Maps to CONCOURSE_LDAP_USER_SEARCH_EMAIL_ATTR."
    default: ""
    type: string

  ldap-user-search-name-attr:
    description: "LDAP attribute for user display name. Maps to CONCOURSE_LDAP_USER_SEARCH_NAME_ATTR."
    default: ""
    type: string

  ldap-user-search-filter:
    description: "LDAP search filter for users (e.g., '(objectClass=person)'). Maps to CONCOURSE_LDAP_USER_SEARCH_FILTER."
    default: ""
    type: string

  ldap-group-search-base-dn:
    description: "Base DN for LDAP group searches. Maps to CONCOURSE_LDAP_GROUP_SEARCH_BASE_DN."
    default: ""
    type: string

  ldap-group-search-name-attr:
    description: "LDAP attribute for group name. Maps to CONCOURSE_LDAP_GROUP_SEARCH_NAME_ATTR."
    default: ""
    type: string

  ldap-group-search-user-attr:
    description: "LDAP attribute on user entries for group matching. Maps to CONCOURSE_LDAP_GROUP_SEARCH_USER_ATTR."
    default: ""
    type: string

  ldap-group-search-group-attr:
    description: "LDAP attribute on group entries for member matching. Maps to CONCOURSE_LDAP_GROUP_SEARCH_GROUP_ATTR."
    default: ""
    type: string

  ldap-group-search-filter:
    description: "LDAP search filter for groups (e.g., '(objectClass=group)'). Maps to CONCOURSE_LDAP_GROUP_SEARCH_FILTER."
    default: ""
    type: string

  main-team-ldap-group:
    description: |
      Comma-separated list of LDAP groups for the main team.
      Example: "ldap:group-a,ldap:group-b"
      Maps to CONCOURSE_MAIN_TEAM_LDAP_GROUP.
    default: ""
    type: string

  # --- Extra CLI flags ---

  extra-web-flags:
    description: |
      Extra CLI flags for 'concourse web', space-separated.
      Appended to the ExecStart command in the systemd service.
      Example: "--enable-across-step --enable-resource-causality"
    default: ""
    type: string

  # --- Build log retention ---

  default-build-logs-to-retain:
    description: |
      Default number of build logs to retain per job. 0 means unlimited.
      Maps to CONCOURSE_DEFAULT_BUILD_LOGS_TO_RETAIN.
    default: 0
    type: int

  default-days-to-retain-build-logs:
    description: |
      Default number of days to retain build logs. 0 means unlimited.
      Maps to CONCOURSE_DEFAULT_DAYS_TO_RETAIN_BUILD_LOGS.
    default: 0
    type: int

  max-build-logs-to-retain:
    description: |
      Maximum number of build logs to retain per job (overrides pipeline settings). 0 means unlimited.
      Maps to CONCOURSE_MAX_BUILD_LOGS_TO_RETAIN.
    default: 0
    type: int

  max-days-to-retain-build-logs:
    description: |
      Maximum days to retain build logs (overrides pipeline settings). 0 means unlimited.
      Maps to CONCOURSE_MAX_DAYS_TO_RETAIN_BUILD_LOGS.
    default: 0
    type: int

  # --- Garbage collection ---

  gc-failed-grace-period:
    description: |
      Grace period before cleaning up failed containers and volumes.
      Example: "1h", "30m". Empty means Concourse default.
      Maps to CONCOURSE_GC_FAILED_GRACE_PERIOD.
    default: ""
    type: string

  # --- Additional local users ---

  extra-local-users:
    description: |
      Additional local users beyond the admin user, as comma-separated user:password-hash pairs.
      These are appended to CONCOURSE_ADD_LOCAL_USER alongside the admin user.
      Example: "oem:{BCRYPT_HASH},ci-bot:{BCRYPT_HASH}"
    default: ""
    type: string
